data:
  train_files: Ricky06662/VisionReasoner_multi_object_7k_840
  remove_lisa: false
  val_files: None
  prompt_key: problem
  max_prompt_length: 1300
  max_response_length: 2048
  rollout_batch_size: 16
  shuffle: true
  seed: 42
  max_pixels: 12845056
  min_pixels: 3136

algorithm:
  adv_estimator: grpo
  kl_coef: 0.0

worker:
  actor:
    global_batch_size: 16
    micro_batch_size_per_device_for_update: 16
    micro_batch_size_per_device_for_experience: 16
    max_grad_norm: 1.0
    use_kl_loss: true
    entropy_coeff: 1e-3
    kl_loss_coef: 5.0e-3
    kl_loss_type: low_var_kl
    model:
      model_path: Qwen/Qwen2.5-VL-7B-Instruct
      enable_gradient_checkpointing: true
      lora_type: lora
      sparsity_level: 1.0
      is_lora_augmented: False
      lora_rank: 0
      lora_rank2: 0
      lora_alpha: 0
      target_modules: all-linear
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
    fsdp:
      param_offload: false
      optimizer_offload: false
      torch_dtype: null
    offload:
      param_offload: true
      optimizer_offload: true

  rollout:
    temperature: 1.0
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.6
    n: 8
    enable_chunked_prefill: true

  ref:
    offload:
      param_offload: true

  reward:
    reward_type: function
    compute_score: vision_reasoner

trainer:
  total_episodes: 1
  logger: ["console", "wandb"]
  project_name: vision_reasoner
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 100
  test_freq: 100000
  val_before_train: false
  val_only: false